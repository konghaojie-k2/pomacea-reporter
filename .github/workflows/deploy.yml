name: 🚀 部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 克隆最新代码
        uses: actions/checkout@v4

      - name: 🚀 通过 SSH 部署（Docker Compose）
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 8m
          timeout: 8m
          script: |
            set -e
            echo "=== $(date) 开始部署 ==="
            cd $DEPLOY_PATH

            # 拉取最新代码
            git pull origin master

            # 停止旧容器，删除旧镜像
            docker compose down --rmi local 2>/dev/null || true

            # 构建并启动新容器
            docker compose up -d --build

            # 等待启动
            sleep 5

            # 验证
            if curl -sf http://localhost:9000/api/records > /dev/null 2>&1; then
              echo "✅ 部署成功！"
              echo "🌐 http://\$SERVER_HOST:9000"
            else
              echo "❌ 启动失败，容器日志:"
              docker compose logs --tail=20
              exit 1
            fi
            echo "=== 部署完成 ==="

        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/admin/pomacea-reporter' }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
