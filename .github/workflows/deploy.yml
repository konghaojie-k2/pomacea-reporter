name: 🚀 自动部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 克隆最新代码
        uses: actions/checkout@v4

      - name: 📦 打包 server
        run: |
          tar -czf server-deploy.tar.gz server/
          echo "打包完成: $(du -sh server-deploy.tar.gz | cut -f1)"

      - name: 🚀 通过 SSH 部署到阿里云
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          timeout: 5m
          script: |
            set -e
            echo "=== $(date) 开始部署 ==="
            DEPLOY_PATH="${DEPLOY_PATH:-/home/admin/pomacea-reporter}"
            API_PORT="${API_PORT:-9000}"
            echo "目标路径: $DEPLOY_PATH"

            mkdir -p $DEPLOY_PATH
            cp -r . $DEPLOY_PATH/
            cd $DEPLOY_PATH
            tar -xzf server-deploy.tar.gz

            OLD_PID=$(pgrep -f "python3.*server/index.py" 2>/dev/null || true)
            if [ -n "$OLD_PID" ]; then
              echo "停止旧进程 PID=$OLD_PID"
              kill $OLD_PID 2>/dev/null || true
              sleep 2
              kill -9 $OLD_PID 2>/dev/null || true
            fi

            echo "启动服务..."
            cd $DEPLOY_PATH/server
            nohup python3 index.py >> $DEPLOY_PATH/api.log 2>&1 &
            sleep 3

            if curl -sf http://localhost:$API_PORT/ > /dev/null 2>&1; then
              echo "✅ 部署成功！API: http://$SERVER_HOST:$API_PORT"
            else
              echo "❌ 启动失败，日志:"
              tail -30 $DEPLOY_PATH/api.log
              exit 1
            fi
            echo "=== 部署完成 ==="

      - name: ✅ 部署成功
        if: success()
        run: |
          echo "🎉 部署完成！"
          echo "🌐 API: https://${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT }}/api"

      - name: ❌ 部署失败
        if: failure()
        run: |
          echo "❌ 部署失败，请检查日志"
          echo "常见原因："
          echo "1. 阿里云安全组未开放 SSH (22) 端口给 GitHub Actions"
          echo "2. 服务器 SSH 密钥未正确配置"
          echo "3. 服务器无法访问外网"
