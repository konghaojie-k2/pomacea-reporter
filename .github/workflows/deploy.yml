name: 🚀 自动部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 克隆最新代码
        uses: actions/checkout@v4

      - name: 🚀 通过 SSH 部署到阿里云
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          timeout: 5m
          tar_skip: |
            .git
            .github
            node_modules
            __pycache__
            *.log
          script: |
            set -e
            DEPLOY_PATH="$HOME/pomacea-reporter"
            API_PORT="9000"
            echo "=== $(date) 开始部署 ==="
            echo "目标: $DEPLOY_PATH"

            # 停止旧进程（只杀 python3 进程，绝不杀 SSH 会话）
            echo "停止旧进程..."
            pkill -f "python3.*server/index.py" 2>/dev/null || true
            sleep 2
            # 确认已停止
            STILL_RUNNING=$(pgrep -f "python3.*server/index.py" 2>/dev/null || true)
            if [ -n "$STILL_RUNNING" ]; then
              echo "强制停止残留进程..."
              pkill -9 -f "python3.*server/index.py" 2>/dev/null || true
              sleep 1
            fi

            # 部署新代码
            echo "部署新文件..."
            mkdir -p "$DEPLOY_PATH"
            rsync -a --exclude='.git' --exclude='.github' \
                   --exclude='node_modules' --exclude='__pycache__' \
                   --exclude='*.log' \
                   /github/workspace/ "$DEPLOY_PATH/"

            # 启动服务
            echo "启动 Python API..."
            cd "$DEPLOY_PATH/server"
            nohup python3 index.py >> "$DEPLOY_PATH/api.log" 2>&1 &
            sleep 3

            # 验证
            if curl -sf http://localhost:$API_PORT/ > /dev/null 2>&1; then
              echo "✅ 部署成功！"
              echo "🌐 API: http://localhost:$API_PORT"
            else
              echo "❌ 启动失败，日志:"
              tail -20 "$DEPLOY_PATH/api.log"
              exit 1
            fi
            echo "=== 部署完成 ==="
