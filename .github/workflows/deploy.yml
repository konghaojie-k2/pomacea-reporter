name: 🚀 部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # 强制使用 Node.js 24（GitHub Actions 将在 2026-06-16 默认升级）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 📥 克隆最新代码
        uses: actions/checkout@v4

      - name: 🚀 通过 SSH 执行 deploy.sh
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: false
          command_timeout: 8m
          timeout: 8m
          script: |
            cd $DEPLOY_PATH
            bash server/deploy.sh deploy

        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/admin/pomacea-reporter' }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
