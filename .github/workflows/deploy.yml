name: 🚀 自动部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🚀 通过 SSH 直接在服务器上 git clone 部署
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          timeout: 5m
          command: |
            set -e
            DEPLOY_PATH="/home/$USERNAME/pomacea-reporter"
            API_PORT="9000"
            REPO_URL="https://github.com/konghaojie-k2/pomacea-reporter.git"
            echo "=== $(date) 开始部署 ==="

            # 停止旧进程
            echo "停止旧进程..."
            if [ -f "$DEPLOY_PATH/server/api.pid" ]; then
              OLD_PID=$(cat "$DEPLOY_PATH/server/api.pid")
              [ -n "$OLD_PID" ] && kill $OLD_PID 2>/dev/null || true
              sleep 1
            fi

            # 直接从 GitHub clone 最新代码
            echo "从 GitHub 拉取最新代码..."
            if [ -d "$DEPLOY_PATH/.git" ]; then
              cd "$DEPLOY_PATH"
              git fetch origin master
              git reset --hard origin/master
              echo "代码更新完成"
            else
              echo "首次部署，执行 clone..."
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi

            # 启动服务
            echo "启动 Python API..."
            cd "$DEPLOY_PATH/server"
            nohup python3 index.py >> "$DEPLOY_PATH/api.log" 2>&1 &
            echo $! > api.pid
            echo "进程 PID=$(cat api.pid)"
            sleep 3

            # 验证
            if curl -sf http://localhost:$API_PORT/ > /dev/null 2>&1; then
              echo "✅ 部署成功！API: http://localhost:$API_PORT"
            else
              echo "❌ 启动失败，日志:"
              tail -20 "$DEPLOY_PATH/api.log"
              exit 1
            fi
            echo "=== 部署完成 ==="
