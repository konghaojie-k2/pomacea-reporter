name: 🚀 自动部署到服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 克隆最新代码
        uses: actions/checkout@v4

      - name: 📦 打包 server
        run: |
          tar -czf server-deploy.tar.gz server/
          echo "打包完成: $(du -sh server-deploy.tar.gz | cut -f1)"

      - name: 🔍 测试 SSH 连接
        run: |
          echo "测试连接 ${SERVER_HOST}:${SERVER_PORT}..."
          timeout 10 bash -c "echo | nc -v $SERVER_HOST $SERVER_PORT" 2>&1 || echo "端口检测完成"

      - name: 🚀 通过 SSH 部署到阿里云
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 跳过 known_hosts 验证（阿里云服务器）
          known_hosts: |
            ${{ secrets.SERVER_HOST }} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA
          command_timeout: 5m
          timeout: 5m
          envs:
            - DEPLOY_PATH
            - API_PORT
          script: |
            set -e
            echo "=== $(date) 开始部署 ==="

            # 打印工作目录
            echo "当前目录: $(pwd)"
            echo "目标路径: $DEPLOY_PATH"

            # 创建目录
            mkdir -p $DEPLOY_PATH

            # 复制新代码
            cp -r . $DEPLOY_PATH/
            cd $DEPLOY_PATH

            # 解压
            tar -xzf server-deploy.tar.gz

            # 停止旧进程
            OLD_PID=$(pgrep -f "python3.*server/index.py" 2>/dev/null || true)
            if [ -n "$OLD_PID" ]; then
              echo "停止旧进程 PID=$OLD_PID"
              kill $OLD_PID 2>/dev/null || true
              sleep 2
              kill -9 $OLD_PID 2>/dev/null || true
            else
              echo "无旧进程，跳过停止步骤"
            fi

            # 启动新进程
            echo "启动服务..."
            cd $DEPLOY_PATH/server
            nohup python3 index.py >> $DEPLOY_PATH/api.log 2>&1 &
            sleep 3

            # 验证
            if curl -sf http://localhost:$API_PORT/ > /dev/null 2>&1; then
              echo "✅ 部署成功！"
              echo "API: http://$SERVER_HOST:$API_PORT"
            else
              echo "❌ 启动失败，日志如下:"
              tail -30 $DEPLOY_PATH/api.log
              exit 1
            fi

            echo "=== 部署完成 ==="
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/admin/pomacea-reporter' }}
          API_PORT: ${{ secrets.API_PORT || '9000' }}

      - name: ✅ 部署成功
        if: success()
        run: |
          echo "🎉 部署完成！"
          echo "🌐 API: https://${{ secrets.SERVER_HOST }}:${{ secrets.API_PORT || '9000' }}/api"

      - name: ❌ 部署失败
        if: failure()
        run: |
          echo "❌ 部署失败，请检查日志"
          echo "常见问题:"
          echo "1. 阿里云安全组是否开放了 22 端口？"
          echo "2. SSH 密钥是否正确添加到了 authorized_keys？"
          echo "3. 服务器是否运行中？"
